<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footer Layout</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  footer {
    background: #222;
    color: white;
    padding: 30px 20px;
  }

  /* REQUIRED CONTAINER */
  .link-boxes {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
  }

  .box {
    flex: 1 1 150px;
    margin: 10px;
  }

  .box h3 {
    margin-bottom: 10px;
    color: #ffcc00;
  }

  .box a {
    display: block;
    color: #bbb;
    text-decoration: none;
    margin: 5px 0;
  }

  .box a:hover {
    color: white;
  }

  /* Media icons */
  .media-icons {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }

  .media-icons a {
    width: 25px;
    height: 25px;
    background: gray;
    border-radius: 50%;
    display: inline-block;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .link-boxes {
      flex-direction: column;
    }
  }
</style>
</head>

<body>

<footer>

  <div class="link-boxes">

    <div class="box">
      <h3>Home</h3>
      <a href="#">Home Page</a>
    </div>

    <div class="box">
      <h3>About</h3>
      <a href="#">About Page</a>
    </div>

    <div class="box">
      <h3>Links</h3>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">More Pages</a>
    </div>

    <div class="box">
      <h3>Services</h3>
      <a href="#">Web Development</a>
      <a href="#">App Development</a>
      <a href="#">Design</a>
    </div>

    <div class="box">
      <h3>Contact</h3>
      <a href="#">8879887262</a>

      <div class="media-icons">
        <a href="#"></a>
        <a href="#"></a>
        <a href="#"></a>
        <a href="#"></a>
        <a href="#"></a>
      </div>

      <a href="#">Social Media</a>
    </div>

  </div>

</footer>

</body>
</html>
