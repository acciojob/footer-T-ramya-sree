<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Company Footer</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  /* FOOTER */
  footer {
    background-color: #1e1e1e;
    color: white;
    padding: 40px 20px;
  }

  .footer-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 20px;
    max-width: 1200px;
    margin: auto;
  }

  .footer-section {
    flex: 1 1 180px;
  }

  .footer-section h3 {
    margin-bottom: 15px;
    color: #ffcc00;
  }

  .footer-section a {
    display: block;
    color: #ccc;
    text-decoration: none;
    margin-bottom: 8px;
    font-size: 14px;
  }

  .footer-section a:hover {
    color: white;
  }

  /* Contact number styling */
  .contact-number {
    margin-top: 10px;
    font-weight: bold;
  }

  /* Media Icons */
  .media-icons {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }

  .media-icons div {
    width: 30px;
    height: 30px;
    background: #333;
    border-radius: 50%;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .footer-container {
      flex-direction: column;
    }
  }
</style>
</head>

<body>

<footer>
  <div class="footer-container">

    <!-- Home -->
    <div class="footer-section">
      <h3>Home</h3>
      <a href="#">Dashboard</a>
      <a href="#">Features</a>
      <a href="#">Updates</a>
    </div>

    <!-- About -->
    <div class="footer-section">
      <h3>About</h3>
      <a href="#">Company Info</a>
      <a href="#">Team</a>
      <a href="#">Careers</a>
    </div>

    <!-- Links -->
    <div class="footer-section">
      <h3>Links</h3>
      <a href="#">Home Page</a>
      <a href="#">About Page</a>
      <a href="#">Blog</a>
      <a href="#">Support</a>
    </div>

    <!-- Services -->
    <div class="footer-section">
      <h3>Services</h3>
      <a href="#">Web Development</a>
      <a href="#">App Development</a>
      <a href="#">UI/UX Design</a>
    </div>

    <!-- Contact -->
    <div class="footer-section">
      <h3>Contact</h3>
      <a href="#">Email Us</a>
      <a href="#">Help Center</a>
      <div class="contact-number">8879887262</div>

      <div class="media-icons">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
      </div>

      <a href="#">Social Media Page</a>
    </div>

  </div>
</footer>

</body>
</html>
